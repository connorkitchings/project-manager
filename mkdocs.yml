site_name: Project Manager
site_description: Internal dashboard for reviewing the status of selected GitHub repositories.

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

nav:
  - Home: index.md
  - Product:
      - Project Brief: project_brief.md
      - Project Charter: project_charter.md
      - Implementation Schedule: implementation_schedule.md
      - v2 Roadmap: v2_roadmap.md
      - Getting Started: getting_started.md
  - Architecture:
      - System Overview: architecture/system_overview.md
      - API Direction: api/README.md
      - ADR: architecture/adr/adr-0001-template.md
  - Operations:
      - Runbook: runbook.md
      - Development Standards: development_standards.md
      - Checklists: checklists.md
      - Knowledge Base: knowledge_base.md
      - Glossary: glossary.md
      - AI Guide: ai_guide.md
  - Legacy:
      - Repository Transition Guide: template_starting_guide.md
      - Validation Guide: template_testing_guide.md
      - Legacy Cleanup Notes: template_migration_guide.md

plugins:
  - search
