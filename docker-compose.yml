services:
  project-manager:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PROJECT_MANAGER_GITHUB_TOKEN=${PROJECT_MANAGER_GITHUB_TOKEN:-}
      - PROJECT_MANAGER_SCHEDULER_ENABLED=${PROJECT_MANAGER_SCHEDULER_ENABLED:-true}
      - PROJECT_MANAGER_SYNC_INTERVAL_MINUTES=${PROJECT_MANAGER_SYNC_INTERVAL_MINUTES:-360}
      - PROJECT_MANAGER_STALE_DATA_THRESHOLD_HOURS=${PROJECT_MANAGER_STALE_DATA_THRESHOLD_HOURS:-48}
    restart: unless-stopped
